# Local dev overrides — ports exposed to host, Development environment
# Applied automatically when running `docker compose` locally.

services:

  # ── Infrastructure ports ─────────────────────────────────────────────────────

  mongo:
    ports:
      - "27017:27017"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "9092:9092"

  elasticsearch:
    ports:
      - "9200:9200"

  # ── Dev tool ports ───────────────────────────────────────────────────────────

  kafka-ui:
    ports:
      - "8090:8080"    # http://localhost:8090

  mongo-express:
    ports:
      - "8091:8081"    # http://localhost:8091

  seq:
    ports:
      - "5341:5341"    # ingestion (OTLP/HTTP logs from services)
      - "5342:80"      # http://localhost:5342  ← Seq UI

  jaeger:
    ports:
      - "16686:16686"  # http://localhost:16686 ← Jaeger UI
      - "4317:4317"    # OTLP gRPC (traces from services)

  prometheus:
    ports:
      - "9090:9090"    # http://localhost:9090  ← Prometheus UI

  grafana:
    ports:
      - "3000:3000"    # http://localhost:3000  ← Grafana UI (metrics dashboards)

  # ── Service ports + Development environment ──────────────────────────────────

  gateway:
    ports:
      - "5000:8080"    # http://localhost:5000
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  product-service:
    ports:
      - "5001:8080"    # http://localhost:5001/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  order-service:
    ports:
      - "5002:8080"    # http://localhost:5002/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  customer-service:
    ports:
      - "5003:8080"    # http://localhost:5003/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  cart-service:
    ports:
      - "5004:8080"    # http://localhost:5004/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  search-service:
    ports:
      - "5005:8080"    # http://localhost:5005/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  payment-service:
    ports:
      - "5006:8080"    # http://localhost:5006/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  notification-service:
    ports:
      - "5007:8080"    # http://localhost:5007/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  inventory-service:
    ports:
      - "5008:8080"    # http://localhost:5008/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
